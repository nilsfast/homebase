entities:
    service:
        icon: server
        fields:
            name: { type: string, required: true }
            url: { type: url }
            port: { type: number }
            host:
                {
                    type: relation,
                    target: host,
                    related_name: "Hosted Services",
                }
            status:
                {
                    type: enum,
                    options: [planned, active, maintenance, degraded, retired],
                }
            dependencies:
                {
                    type: relation,
                    target: service,
                    many: true,
                    related_name: "Depends On",
                }
            notes: { type: markdown }
        list_columns: [name, status, url, port, host]

    host:
        icon: hard-drive
        label: Host
        fields:
            hostname: { type: string, required: true }
            ip: { type: string }
            os: { type: string }
            specs: { type: json }
            location: { type: string }
            role:
                {
                    type: enum,
                    options:
                        [
                            server,
                            workstation,
                            laptop,
                            vm,
                            appliance,
                            storage,
                            network,
                        ],
                }
        list_columns: [hostname, ip, os, role, location]

    credential:
        icon: key
        fields:
            service:
                {
                    type: relation,
                    target: service,
                    required: true,
                    related_name: "Credentials",
                }
            username: { type: string, required: true }
            encrypted_password: { type: string, required: true, hidden: true }
            two_factor_method:
                {
                    type: enum,
                    options:
                        [
                            totp,
                            sms,
                            push,
                            security_key,
                            email,
                            backup_codes,
                            none,
                        ],
                }
            recovery_info: { type: markdown }
        list_columns: [service, username, two_factor_method]

    account:
        icon: user
        fields:
            provider: { type: string, required: true }
            owner: { type: string, required: true }
            email: { type: email }
            linked_credentials:
                {
                    type: relation,
                    target: credential,
                    many: true,
                    related_name: "Used By Accounts",
                }
        list_columns: [provider, owner, email, linked_credentials]

    subscription:
        icon: receipt
        label: Subscription
        fields:
            provider: { type: string, required: true }
            cost: { type: number }
            billing_cycle:
                { type: enum, options: [monthly, quarterly, yearly, one-time] }
            renewal_date: { type: date }
            cancellation_terms: { type: markdown }
        list_columns: [provider, cost, billing_cycle, renewal_date]
